# ============================================================
#  AI Stack Locale — Ollama + Open WebUI + Kokoro TTS + SearXNG
#  Security: HTTPS enabled via Nginx Reverse Proxy
#  Hardware: NVIDIA RTX 3080 12GB | RAM: 32GB | OS: WSL2 Ubuntu
# ============================================================

networks:
  ai-net:
    driver: bridge

volumes:
  ollama-data:
  openwebui-data:
  searxng-data:

services:

  # ----------------------------------------------------------
  # NGINX — SSL Termination Proxy
  # Handles HTTPS traffic and forwards it to Open WebUI
  # ----------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    networks:
      - ai-net
    ports:
      - "443:443" # Standard HTTPS port
    volumes:
      - ./certs:/etc/nginx/certs:ro # Map your manual certificates here
      - ./nginx.conf:/etc/nginx/nginx.conf:ro # Nginx configuration file
    depends_on:
      - open-webui

  # ----------------------------------------------------------
  # OLLAMA — LLM Engine with NVIDIA GPU Support
  # ----------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    networks:
      - ai-net
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_PARALLEL=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]


# ----------------------------------------------------------
  # OLLAMA MODEL PULLER — Automatically pulls llama3:latest
  # ----------------------------------------------------------
  ollama-pull:
    image: curlimages/curl:latest
    container_name: ollama-pull
    restart: "no"
    networks:
      - ai-net
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      sh -c "
        echo 'Waiting for Ollama to be ready...';
        sleep 10;
        echo 'Downloading llama3:latest model...';
        curl -X POST $$OLLAMA_HOST/api/pull -d '{\"name\": \"llama3:latest\"}';
        echo 'Pre-loading model into VRAM...';
        curl -X POST $$OLLAMA_HOST/api/generate -d '{\"model\": \"llama3:latest\"}';
        echo 'Model llama3:latest is ready in memory.';
      "
    depends_on:
      - ollama


  # ----------------------------------------------------------
  # KOKORO TTS — High-quality Text-to-Speech on GPU
  # Supports Italian and English natively
  # ----------------------------------------------------------
  kokoro-tts:
    image: ghcr.io/remsky/kokoro-fastapi-gpu:latest
    container_name: kokoro-tts
    restart: unless-stopped
    networks:
      - ai-net
    ports:
      - "8880:8880"
    environment:
      - TZ=Europe/Rome
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ----------------------------------------------------------
  # SEARXNG — Self-hosted Web Search Engine
  # ----------------------------------------------------------
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    networks:
      - ai-net
    ports:
      - "8080:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080

  # ----------------------------------------------------------
  # OPEN WEBUI — Web Interface configured for Kokoro & SSL
  # Note: External port 3000 removed to enforce HTTPS via Nginx
  # ----------------------------------------------------------
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    networks:
      - ai-net
    volumes:
      - openwebui-data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      # SET DEFAULT MODEL ON STARTUP
      - DEFAULT_MODELS=llama3:latest
      # Web Search configuration via SearXNG
      - ENABLE_WEB_SEARCH=true
      - WEB_SEARCH_ENGINE=searxng
      - SEARXNG_QUERY_URL=http://searxng:8080/search?q=<query>
      - WEB_SEARCH_RESULT_COUNT=10
      - BYPASS_WEB_SEARCH_EMBEDDING_AND_RETRIEVAL=false
      - BYPASS_WEB_SEARCH_WEB_LOADER=false
      # Audio configuration for Kokoro (OpenAI compatible)
      - AUDIO_TTS_ENGINE=openai
      - AUDIO_TTS_OPENAI_API_BASE_URL=http://kokoro-tts:8880/v1
      - AUDIO_TTS_OPENAI_API_KEY=not-needed
      - AUDIO_TTS_MODEL=kokoro
      - AUDIO_TTS_VOICE=af_bella # Italian female voice: if_sara 

    depends_on:
      - ollama
      - kokoro-tts
      - searxng
