# ============================================================
#  AI Stack Locale — Ollama + Open WebUI + Kokoro TTS + SearXNG
#  GPU: NVIDIA RTX 3080 12GB | RAM: 32GB | OS: WSL2 Ubuntu
# ============================================================

networks:
  ai-net:
    driver: bridge

volumes:
  ollama-data:
  openwebui-data:
  searxng-data:

services:

  # ----------------------------------------------------------
  # OLLAMA — motore LLM con supporto GPU NVIDIA
  # ----------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    networks:
      - ai-net
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_PARALLEL=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ----------------------------------------------------------
  # OLLAMA MODEL PULLER — scarica gemma4:e4b al primo avvio
  # ----------------------------------------------------------
  # ----------------------------------------------------------
  # OLLAMA MODEL PULLER & PRELOADER
  # ----------------------------------------------------------
  ollama-pull:
    image: curlimages/curl:latest
    container_name: ollama-pull
    restart: "no"
    networks:
      - ai-net
    # Aggiungiamo l'environment per definire l'host
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      sh -c "
        echo 'Aspetto che Ollama sia pronto...';
        sleep 10;
        echo 'Scaricamento modello gemma4:e4b...';
        curl -X POST $$OLLAMA_HOST/api/pull -d '{\"name\": \"gemma4:e4b\"}';
        echo 'Pre-caricamento del modello in VRAM...';
        curl -X POST $$OLLAMA_HOST/api/generate -d '{\"model\": \"gemma4:e4b\"}';
        echo 'Modello gemma4:e4b caricato e pronto in memoria.';
      "
    depends_on:
      - ollama

  # ----------------------------------------------------------
  # KOKORO TTS — sintesi vocale di alta qualità su GPU
  # Gestisce nativamente sia Italiano che Inglese
  # ----------------------------------------------------------
  kokoro-tts:
    image: ghcr.io/remsky/kokoro-fastapi-gpu:latest
    container_name: kokoro-tts
    restart: unless-stopped
    networks:
      - ai-net
    ports:
      - "8880:8880"
    environment:
      - TZ=Europe/Rome
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ----------------------------------------------------------
  # SEARXNG — motore di ricerca web self-hosted
  # ----------------------------------------------------------
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    networks:
      - ai-net
    ports:
      - "8080:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080

  # ----------------------------------------------------------
  # OPEN WEBUI — interfaccia web configurata per Kokoro
  # ----------------------------------------------------------
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    networks:
      - ai-net
    ports:
      - "0.0.0.0:3000:8080"
    volumes:
      - openwebui-data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      # Configurazione per la ricerca web in open webui
      - ENABLE_WEB_SEARCH=true
      - WEB_SEARCH_ENGINE=searxng
      - SEARXNG_QUERY_URL=http://searxng:8080/search?q=<query>
      - WEB_SEARCH_RESULT_COUNT=10
      - BYPASS_WEB_SEARCH_EMBEDDING_AND_RETRIEVAL=false
      - BYPASS_WEB_SEARCH_WEB_LOADER=false
      
      # Configurazione Audio per Kokoro (OpenAI compatible)
      - AUDIO_TTS_ENGINE=openai
      - AUDIO_TTS_OPENAI_API_BASE_URL=http://kokoro-tts:8880/v1
      - AUDIO_TTS_OPENAI_API_KEY=not-needed
      - AUDIO_TTS_MODEL=kokoro
      - AUDIO_TTS_VOICE=af_bella # if_sara Voce italiana femminile 

    depends_on:
      - ollama
      - kokoro-tts
      - searxng
